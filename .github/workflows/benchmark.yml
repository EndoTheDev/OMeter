name: Benchmark Ollama Cloud Models

on:
  schedule:
    - cron: "0 3,9,15,21 * * *"
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Benchmark cloud models
        env:
          OLLAMA_CLOUD_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
        run: uv run ometer --cloud --ttft --tps --runs 3 --parallel 3 --num_predict 2000 --json > benchmark-latest.json

      - name: Merge into time-series history
        run: uv run python .github/merge_benchmark.py benchmark-latest.json docs/data/benchmark-history.json

      - name: Commit and push data
        run: |
          git config user.name "OMeter Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/benchmark-history.json
          git diff --staged --quiet || (
            git commit -m "chore: auto-benchmark [skip ci]" &&
            git push
          )
